<app-form-modal
  [isOpen]="isOpen()"
  [title]="isEditing() ? 'Editar Tarea' : 'Nueva Tarea'"
  [isEditing]="isEditing()"
  [isSaveDisabled]="isSaveDisabled()"
  (save)="onSave()"
  (dismiss)="onDismiss()">
  <ion-input
    label="Título"
    labelPlacement="floating"
    placeholder="Ingresa la tarea"
    [value]="title()"
    (ionInput)="onTitleInput($any($event.target).value)"
    class="custom-input">
  </ion-input>
  <div class="category-trigger" (click)="openCategoryPicker()">
    <span class="category-trigger-label">Categoría</span>
    @if (getSelectedCategory(); as cat) {
    <div class="category-trigger-value">
      <span class="category-dot" [style.background]="cat.color"></span>
      {{ cat.name }}
    </div>
    } @else {
    <div class="category-trigger-value placeholder">Sin categoría</div>
    }
    <ion-icon name="chevron-forward" class="trigger-arrow"></ion-icon>
  </div>
</app-form-modal>

<ion-modal [isOpen]="isCategoryPickerOpen()" (didDismiss)="closeCategoryPicker()" class="category-picker-modal">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>Seleccionar Categoría</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="closeCategoryPicker()">Cerrar</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list>
        <ion-item button (click)="selectCategory(null)">
          <span class="category-color" style="background: #999"></span>
          <ion-label>Sin categoría</ion-label>
          @if (categoryId() === null) {
          <ion-icon slot="end" name="checkmark" color="primary"></ion-icon>
          }
        </ion-item>
        @for (category of categories(); track category.id) {
        <ion-item button (click)="selectCategory(category.id)">
          <span class="category-color" [style.background]="category.color"></span>
          <ion-label>{{ category.name }}</ion-label>
          @if (categoryId() === category.id) {
          <ion-icon slot="end" name="checkmark" color="primary"></ion-icon>
          }
        </ion-item>
        }
      </ion-list>
    </ion-content>
  </ng-template>
</ion-modal>
